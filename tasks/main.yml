---
# roles/ansible_role_dockerhost/tasks/main.yml

- name: Docker APT Repository Setup
  tags: docker_repository
  block:
    - name: Install required APT packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Ensure keyring directory exists at /etc/apt/keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Download Docker's official GPG key (ASCII format)
      ansible.builtin.get_url:
        url: "{{ ansible_role_dockerhost_gpg_key_url }}"
        dest: /etc/apt/keyrings/docker.asc
        mode: 'u=rw,g=r,o=r'

    - name: Set permissions for Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.asc
        mode: 'u=rw,g=r,o=r'

    - name: Check Docker key exists
      ansible.builtin.stat:
        path: /etc/apt/keyrings/docker.asc
      register: ansible_role_dockerhost_docker_key

    - name: Fail if Docker GPG key missing
      ansible.builtin.fail:
        msg: "Docker GPG Key not found!"
      when: not ansible_role_dockerhost_docker_key.stat.exists

    - name: Assert Docker architecture is supported
      ansible.builtin.assert:
        that:
          - ansible_facts['architecture'] in ansible_role_dockerhost_architecture_map
        fail_msg: >-
          Unsupported architecture '{{ ansible_facts["architecture"] }}'.
          Supported architectures: {{ ansible_role_dockerhost_architecture_map.keys() | sort | join(', ') }}

    - name: Set up Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_role_dockerhost_architecture_map[ansible_facts['architecture']] }}
          signed-by=/etc/apt/keyrings/docker.asc]
          {{ ansible_role_dockerhost_repo_url }}
          {{ ansible_facts['lsb']['codename'] }}
          {{ ansible_role_dockerhost_release_channel }}
        state: present
        filename: docker

    - name: Clean APT cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
        force: true
      changed_when: false
      failed_when: false

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      failed_when: false

- name: Install Docker
  tags: docker_install
  block:
    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ ansible_role_dockerhost_packages }}"
        state: "{{ ansible_role_dockerhost_package_state }}"

- name: Sanity Checks - Verify Docker Installation
  tags: docker_check
  block:
    - name: Check Docker CLI version
      ansible.builtin.command: docker --version
      register: ansible_role_dockerhost_docker_version_output
      changed_when: false
      failed_when: ansible_role_dockerhost_docker_version_output.rc != 0

    - name: Display Docker CLI version
      ansible.builtin.debug:
        msg: "Docker CLI Version: {{ ansible_role_dockerhost_docker_version_output.stdout }}"

    - name: Check Docker Compose plugin version
      ansible.builtin.command: docker compose version
      register: ansible_role_dockerhost_compose_version_output
      changed_when: false
      failed_when: ansible_role_dockerhost_compose_version_output.rc != 0

    - name: Display Docker Compose plugin version
      ansible.builtin.debug:
        msg: "Docker Compose Plugin Version: {{ ansible_role_dockerhost_compose_version_output.stdout }}"
